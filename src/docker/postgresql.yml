version: '3.8'

services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: cabinetmedical-postgres
    environment:
      POSTGRESQL_USERNAME: admin
      POSTGRESQL_PASSWORD: admin123
      POSTGRESQL_DATABASE: cabinetmedical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - cabinetmedical-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cabinetmedical-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cabinetmedical-network

volumes:
  postgres_data:

networks:
  cabinetmedical-network:
    driver: bridge